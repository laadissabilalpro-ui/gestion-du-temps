.tm-app *{box-sizing:border-box;}
.tm-app{
  --bg:#F6F3EE; --surface:#FFFFFF; --surface-2:#F0ECE5; --text:#2B2722; --text-soft:#7A7269;
  --border:#E7E1D8; --accent:#E0795F; --accent-d:#C75F45; --shadow:rgba(60,50,40,.12);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--text); background:var(--bg); min-height:100vh; width:100%; -webkit-font-smoothing:antialiased;
}
.tm-app[data-theme="dark"]{
  --bg:#1B1A18; --surface:#262320; --surface-2:#2F2B27; --text:#EDE8E1; --text-soft:#A59C90;
  --border:#3A352F; --accent:#E0795F; --accent-d:#F0916F; --shadow:rgba(0,0,0,.4);
}
.tm-app input,.tm-app textarea,.tm-app select,.tm-app button{font-family:inherit;}
.tm-shell{display:flex; min-height:100vh;}
.tm-main{flex:1; min-width:0; padding:26px 30px 110px; overflow-x:hidden;}
.tm-view{max-width:1080px; margin:0 auto; animation:fade .35s ease;}
@keyframes fade{from{opacity:0; transform:translateY(6px);}to{opacity:1; transform:none;}}
.tm-nav{position:sticky; top:0; align-self:flex-start; height:100vh; width:200px; flex-shrink:0;
  background:var(--surface); border-right:1px solid var(--border); padding:22px 14px;
  display:flex; flex-direction:column; gap:6px; z-index:30;}
.tm-brand{display:flex; align-items:center; gap:10px; padding:6px 10px 18px;}
.tm-brand-dot{width:22px; height:22px; border-radius:7px; background:linear-gradient(135deg,#F7A6C2,#E0795F); box-shadow:0 2px 8px var(--shadow);}
.tm-brand-name{font-weight:700; font-size:16px; letter-spacing:-.2px;}
.tm-nav-items{display:flex; flex-direction:column; gap:4px; flex:1;}
.tm-nav-btn{display:flex; align-items:center; gap:12px; padding:11px 12px; border:none; background:transparent;
  color:var(--text-soft); border-radius:12px; cursor:pointer; font-size:14.5px; font-weight:600; transition:.18s; text-align:left;}
.tm-nav-btn:hover{background:var(--surface-2); color:var(--text);}
.tm-nav-btn.on{background:var(--accent); color:#fff; box-shadow:0 4px 14px rgba(224,121,95,.35);}
.tm-nav-btn.theme{margin-top:auto;}
.tm-eyebrow{color:var(--accent-d); font-weight:700; text-transform:uppercase; letter-spacing:1.5px; font-size:12px;}
.tm-bigdate{font-size:42px; font-weight:800; letter-spacing:-1px; margin:2px 0; line-height:1;}
.tm-subdate{color:var(--text-soft); font-weight:600;}
.tm-today-head{display:flex; justify-content:space-between; align-items:flex-start; gap:20px; flex-wrap:wrap; margin-bottom:26px;}
.tm-today-actions{display:flex; gap:10px; flex-wrap:wrap;}
.tm-h1{font-size:30px; font-weight:800; letter-spacing:-.5px; margin:0;}
.tm-head-simple{margin-bottom:22px; display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap;}
.tm-muted{color:var(--text-soft); margin:4px 0 0; font-size:14px;}
.tm-btn{display:inline-flex; align-items:center; gap:7px; padding:9px 15px; border-radius:11px; border:1px solid var(--border);
  background:var(--surface); color:var(--text); font-weight:650; font-size:14px; cursor:pointer; transition:.16s;}
.tm-btn:hover{transform:translateY(-1px); box-shadow:0 4px 12px var(--shadow);}
.tm-btn.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
.tm-btn.primary:hover{background:var(--accent-d);}
.tm-btn.small{padding:6px 11px; font-size:13px;}
.tm-btn.ghost{background:transparent;}
.tm-btn.danger{background:transparent; border-color:transparent; color:#C0392B;}
.tm-btn.danger:hover{background:rgba(192,57,43,.1);}
.tm-btn.clear{margin-top:18px; color:var(--text-soft);}
.tm-icon-btn{display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:10px;
  border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; transition:.16s;}
.tm-icon-btn:hover{background:var(--surface-2);}
.tm-icon-btn.ghost{border-color:transparent; background:transparent; color:var(--text-soft);}
.tm-icon-btn.big{width:48px; height:48px;}
.tm-spacer{flex:1;}
.tm-section{margin-bottom:30px;}
.tm-section-title{display:flex; align-items:center; gap:9px; font-size:17px; font-weight:750; margin:0 0 14px;}
.tm-section-row{display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:14px;}
.tm-section-row .tm-section-title{margin:0;}
.tm-empty{color:var(--text-soft); background:var(--surface); border:1px dashed var(--border); border-radius:14px; padding:18px; font-size:14px;}
.tm-empty.small{padding:12px; font-size:13px;}
.tm-progress-wrap{display:flex; align-items:center; gap:10px;}
.tm-progress{width:160px; height:9px; background:var(--surface-2); border-radius:99px; overflow:hidden;}
.tm-progress-bar{height:100%; background:linear-gradient(90deg,#A6DD97,#2E7D32); border-radius:99px; transition:width .5s cubic-bezier(.4,0,.2,1);}
.tm-progress-label{font-size:13px; color:var(--text-soft); font-weight:650; white-space:nowrap;}
.tm-rdv-list{display:flex; flex-direction:column; gap:9px;}
.tm-rdv{display:flex; align-items:stretch; gap:13px; background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:12px 15px; cursor:pointer; transition:.16s;}
.tm-rdv:hover{transform:translateY(-1px); box-shadow:0 5px 16px var(--shadow);}
.tm-rdv-time{display:flex; flex-direction:column; min-width:58px;}
.tm-rdv-h{font-weight:800; font-size:16px;}
.tm-rdv-dur{font-size:11.5px; color:var(--text-soft);}
.tm-rdv-bar{width:4px; border-radius:4px; background:var(--accent);}
.tm-rdv-title{font-weight:650; align-self:center;}
.tm-today-tasks{display:flex; flex-direction:column; gap:11px;}
.tm-postit{position:relative; border-radius:5px 12px 12px 12px; padding:13px 14px 11px;
  box-shadow:0 6px 14px var(--shadow),0 1px 0 rgba(255,255,255,.4) inset; cursor:pointer;
  transition:transform .18s cubic-bezier(.3,1.3,.5,1),box-shadow .18s,opacity .25s; animation:pop .28s cubic-bezier(.3,1.4,.5,1);}
.tm-postit::after{content:""; position:absolute; right:0; bottom:0; width:0; height:0;
  border-style:solid; border-width:0 0 18px 18px; border-color:transparent transparent rgba(0,0,0,.08) transparent; border-radius:0 0 12px 0;}
@keyframes pop{from{opacity:0; transform:scale(.92) translateY(6px);}to{opacity:1;}}
.tm-postit:hover{box-shadow:0 10px 22px var(--shadow);}
.tm-postit.grab{cursor:grab; touch-action:none;}
.tm-postit.grab:active{cursor:grabbing;}
.tm-postit.done{opacity:.55;}
.tm-postit.done .tm-postit-title{text-decoration:line-through;}
.tm-postit.dragging{opacity:.32; box-shadow:none;}
.tm-tape{position:absolute; top:-7px; left:50%; transform:translateX(-50%) rotate(-2deg); width:46px; height:14px;
  background:rgba(255,255,255,.45); border-radius:2px; box-shadow:0 1px 2px rgba(0,0,0,.08);}
.tm-postit-top{display:flex; align-items:flex-start; gap:9px;}
.tm-postit-title{font-weight:700; font-size:15px; line-height:1.25; flex:1; word-break:break-word;}
.tm-postit-note{font-size:13px; opacity:.78; margin:6px 0 0 28px; line-height:1.35; word-break:break-word;}
.tm-postit-foot{display:flex; align-items:center; justify-content:space-between; margin:9px 0 0 28px; gap:8px;}
.tm-postit.compact{padding:8px 10px;}
.tm-postit.compact .tm-postit-title{font-size:13px;}
.tm-postit.compact .tm-postit-foot{margin-left:24px; margin-top:5px;}
.tm-grip{opacity:.4;}
.tm-date-chip{font-size:11px; font-weight:700; padding:2px 8px; border-radius:99px; background:rgba(255,255,255,.5); color:inherit;}
.tm-date-chip.today{background:var(--accent); color:#fff;}
.tm-date-chip.muted{opacity:.6; background:rgba(255,255,255,.35);}
.tm-check{flex-shrink:0; width:21px; height:21px; border-radius:7px; border:2px solid var(--accent,currentColor);
  background:rgba(255,255,255,.5); color:var(--accent); display:inline-flex; align-items:center; justify-content:center;
  cursor:pointer; transition:.15s; margin-top:1px;}
.tm-check:hover{background:rgba(255,255,255,.85);}
.tm-check.on{background:var(--accent); color:#fff; border-color:var(--accent); animation:checkpop .3s;}
.tm-check.round{border-radius:50%;}
@keyframes checkpop{0%{transform:scale(.6);}60%{transform:scale(1.18);}100%{transform:scale(1);}}
.tm-matrix{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
.tm-quad{background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:14px; display:flex; flex-direction:column;
  border-top:4px solid var(--accent); min-height:200px;}
.tm-quad-head{display:flex; align-items:flex-start; gap:10px; margin-bottom:12px;}
.tm-quad-dot{width:12px; height:12px; border-radius:50%; margin-top:4px; flex-shrink:0;}
.tm-quad-title{font-size:15px; font-weight:750; margin:0; line-height:1.2;}
.tm-quad-sub{font-size:12.5px; color:var(--text-soft);}
.tm-quad-add{margin-left:auto; width:30px; height:30px; border-radius:9px; border:1px solid var(--border); background:var(--surface-2);
  color:var(--text); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; transition:.15s;}
.tm-quad-add:hover{background:var(--accent); color:#fff; border-color:var(--accent);}
.tm-quad-body{flex:1; display:flex; flex-direction:column; gap:10px; min-height:80px; border-radius:12px; padding:4px; transition:background .18s;}
.tm-quad-body.over{background:rgba(224,121,95,.08); outline:2px dashed var(--accent); outline-offset:-2px;}
.tm-quad-empty{color:var(--text-soft); font-size:13px; text-align:center; padding:24px 8px; border:1px dashed var(--border); border-radius:10px;}
.tm-insert{height:3px; border-radius:3px; background:var(--accent); margin:1px 4px; box-shadow:0 0 8px var(--accent);}
.tm-ghost{position:fixed; top:0; left:0; z-index:9999; pointer-events:none; padding:11px 14px; border-radius:5px 12px 12px 12px;
  box-shadow:0 14px 30px rgba(0,0,0,.28); opacity:.95; font-weight:700; font-size:14px; max-width:280px; transform:rotate(-3deg); will-change:transform;}
.tm-ghost-label{display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.tm-cal-head{display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:18px;}
.tm-cal-nav{display:flex; align-items:center; gap:10px;}
.tm-cal-title{font-size:21px; font-weight:750; margin:0; min-width:180px;}
.tm-segment{display:inline-flex; background:var(--surface-2); border-radius:11px; padding:3px;}
.tm-segment button{border:none; background:transparent; color:var(--text-soft); padding:7px 16px; border-radius:9px; cursor:pointer; font-weight:650; font-size:13.5px; transition:.15s;}
.tm-segment button.on{background:var(--surface); color:var(--text); box-shadow:0 2px 6px var(--shadow);}
.tm-weekgrid{background:var(--surface); border:1px solid var(--border); border-radius:18px; overflow:hidden;}
.tm-week-headrow{display:grid; grid-template-columns:54px repeat(7,1fr); border-bottom:1px solid var(--border);}
.tm-week-corner{border-right:1px solid var(--border);}
.tm-week-dayhead{display:flex; flex-direction:column; align-items:center; padding:10px 4px; border:none; border-left:1px solid var(--border);
  background:transparent; color:var(--text); cursor:pointer; transition:.15s;}
.tm-week-dayhead:hover{background:var(--surface-2);}
.tm-wd-name{font-size:12px; color:var(--text-soft); text-transform:uppercase; font-weight:650;}
.tm-wd-num{font-size:18px; font-weight:750;}
.tm-week-dayhead.today .tm-wd-num{background:var(--accent); color:#fff; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-top:2px;}
.tm-week-allday{display:grid; grid-template-columns:54px repeat(7,1fr); border-bottom:1px solid var(--border); min-height:46px;}
.tm-week-allday-label{font-size:10.5px; color:var(--text-soft); writing-mode:vertical-rl; transform:rotate(180deg); text-align:center; padding:4px 0; border-right:1px solid var(--border);}
.tm-week-allday-cell{border-left:1px solid var(--border); padding:5px; display:flex; flex-direction:column; gap:5px; min-height:46px; transition:.15s;}
.tm-week-allday-cell.over{background:rgba(224,121,95,.1); outline:2px dashed var(--accent); outline-offset:-2px;}
.tm-week-body{display:grid; grid-template-columns:54px repeat(7,1fr); position:relative;}
.tm-week-hours{display:flex; flex-direction:column;}
.tm-hour-row{height:${qo}px; position:relative; border-right:1px solid var(--border);}
.tm-hour-row span{position:absolute; top:-7px; right:6px; font-size:10.5px; color:var(--text-soft);}
.tm-week-col{position:relative; border-left:1px solid var(--border); cursor:pointer;}
.tm-hour-cell{height:${qo}px; border-bottom:1px solid var(--border);}
.tm-week-rdv{position:absolute; left:3px; right:3px; background:var(--accent); color:#fff; border-radius:7px; padding:3px 6px;
  font-size:11px; overflow:hidden; box-shadow:0 2px 6px rgba(224,121,95,.4); line-height:1.25;}
.tm-week-rdv strong{font-weight:750;}
.tm-agenda{display:flex; flex-direction:column; gap:11px;}
.tm-agenda-day{background:var(--surface); border:1px solid var(--border); border-radius:15px; padding:11px 13px; transition:.15s;}
.tm-agenda-day.over{background:rgba(224,121,95,.08); outline:2px dashed var(--accent);}
.tm-agenda-day.today{border-color:var(--accent);}
.tm-agenda-head{display:flex; align-items:baseline; gap:9px; border:none; background:transparent; color:var(--text); cursor:pointer; width:100%; padding:0 0 6px;}
.tm-agenda-dow{text-transform:uppercase; font-size:12px; color:var(--text-soft); font-weight:700;}
.tm-agenda-num{font-size:20px; font-weight:800;}
.tm-agenda-mon{font-size:12px; color:var(--text-soft);}
.tm-agenda-today{margin-left:auto; background:var(--accent); color:#fff; font-size:11px; font-weight:700; padding:2px 9px; border-radius:99px;}
.tm-agenda-rdv{font-size:13px; padding:5px 0; border-top:1px solid var(--border);}
.tm-agenda-rdv strong{color:var(--accent-d);}
.tm-agenda-rdv em{color:var(--text-soft); font-style:normal;}
.tm-agenda-tasks{display:flex; flex-direction:column; gap:8px; margin-top:8px;}
.tm-agenda-empty{color:var(--text-soft); font-size:13px; text-align:center; padding:4px;}
.tm-month{background:var(--surface); border:1px solid var(--border); border-radius:18px; overflow:hidden;}
.tm-month-dow{display:grid; grid-template-columns:repeat(7,1fr); border-bottom:1px solid var(--border);}
.tm-month-dow div{padding:9px 6px; font-size:12px; font-weight:650; color:var(--text-soft); text-align:center; text-transform:uppercase;}
.tm-month-grid{display:grid; grid-template-columns:repeat(7,1fr);}
.tm-month-cell{min-height:96px; border-left:1px solid var(--border); border-top:1px solid var(--border); padding:5px 6px; cursor:pointer; transition:.15s; overflow:hidden;}
.tm-month-cell:nth-child(7n+1){border-left:none;}
.tm-month-cell:hover{background:var(--surface-2);}
.tm-month-cell.dim{opacity:.4;}
.tm-month-cell.over{background:rgba(224,121,95,.1); outline:2px dashed var(--accent); outline-offset:-2px;}
.tm-month-num{font-size:13px; font-weight:700; width:24px; height:24px; display:flex; align-items:center; justify-content:center; border-radius:50%;}
.tm-month-cell.today .tm-month-num{background:var(--accent); color:#fff;}
.tm-month-items{display:flex; flex-direction:column; gap:3px; margin-top:3px;}
.tm-month-chip{font-size:10.5px; font-weight:650; color:#3a2f25; padding:2px 6px; border-radius:5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.tm-month-chip.done{opacity:.5; text-decoration:line-through;}
.tm-month-more{font-size:10.5px; color:var(--text-soft); font-weight:600;}
.tm-month-rdv{font-size:10.5px; color:var(--accent-d); font-weight:700; display:flex; align-items:center; gap:3px;}
.tm-switch{display:inline-flex; align-items:center; gap:8px; font-size:13.5px; color:var(--text-soft); cursor:pointer; font-weight:600;}
.tm-switch input{width:17px; height:17px; accent-color:var(--accent);}
.tm-course-add{display:flex; gap:9px; margin-bottom:20px; flex-wrap:wrap;}
.tm-course-add .tm-input{flex:1; min-width:160px;}
.tm-course-add .tm-input.cat{max-width:200px;}
.tm-course-list,.tm-course-group{display:flex; flex-direction:column; gap:7px;}
.tm-course-groups{display:flex; flex-direction:column; gap:20px;}
.tm-course-group-title{font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:var(--text-soft); margin:0 0 8px; font-weight:700;}
.tm-course{display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:11px 14px; transition:.16s;}
.tm-course:hover{box-shadow:0 4px 12px var(--shadow);}
.tm-course-label{flex:1; font-weight:600;}
.tm-course-cat{font-size:11.5px; color:var(--text-soft); background:var(--surface-2); padding:3px 9px; border-radius:99px;}
.tm-course.bought{opacity:.5;}
.tm-course.bought .tm-course-label{text-decoration:line-through;}
.tm-pomo{background:var(--surface); border:1px solid var(--border); border-radius:22px; padding:26px; display:flex; flex-direction:column; align-items:center; gap:18px; position:relative; overflow:hidden;}
.tm-pomo.flash{animation:flash 1.3s ease;}
@keyframes flash{0%,100%{box-shadow:0 0 0 0 transparent;}30%{box-shadow:0 0 0 6px var(--pc);}}
.tm-pomo-modes{display:inline-flex; background:var(--surface-2); border-radius:13px; padding:4px; gap:2px; flex-wrap:wrap; justify-content:center;}
.tm-pomo-mode{border:none; background:transparent; color:var(--text-soft); padding:8px 16px; border-radius:10px; cursor:pointer; font-weight:700; font-size:13.5px; transition:.15s;}
.tm-pomo-mode.on{background:var(--pc); color:#fff;}
.tm-ring-wrap{position:relative; width:280px; height:280px; max-width:74vw; max-height:74vw;}
.tm-ring{width:100%; height:100%; transform:rotate(-90deg);}
.tm-ring-bg{fill:none; stroke:var(--surface-2); stroke-width:16;}
.tm-ring-fg{fill:none; stroke-width:16; stroke-linecap:round; transition:stroke-dashoffset 1s linear,stroke .3s;}
.tm-ring-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;}
.tm-ring-time{font-size:54px; font-weight:800; letter-spacing:-2px; font-variant-numeric:tabular-nums;}
.tm-ring-mode{font-size:14px; font-weight:700; display:flex; align-items:center; gap:6px;}
.tm-pomo-task{width:100%; max-width:420px; text-align:center; display:flex; flex-direction:column; gap:9px;}
.tm-pomo-working{font-size:15px;}
.tm-pomo-working.muted{color:var(--text-soft);}
.tm-pomo-controls{display:flex; align-items:center; gap:18px;}
.tm-pomo-play{width:72px; height:72px; border-radius:50%; border:none; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 22px var(--shadow); transition:.16s;}
.tm-pomo-play:hover{transform:scale(1.06);}
.tm-pomo-count{font-size:15px; font-weight:700;}
.tm-pomo-settings{background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:20px; margin-top:18px;}
.tm-pomo-settings h3{margin:0 0 14px; font-size:16px;}
.tm-pomo-settings-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px;}
.tm-numfield{display:flex; flex-direction:column; gap:7px; font-size:13px; color:var(--text-soft); font-weight:650;}
.tm-stepper{display:flex; align-items:center; gap:0; border:1px solid var(--border); border-radius:11px; overflow:hidden;}
.tm-stepper button{width:38px; height:40px; border:none; background:var(--surface-2); color:var(--text); font-size:20px; cursor:pointer; transition:.15s;}
.tm-stepper button:hover{background:var(--accent); color:#fff;}
.tm-stepper input{flex:1; width:100%; border:none; text-align:center; background:var(--surface); color:var(--text); font-size:16px; font-weight:700; -moz-appearance:textfield;}
.tm-stepper input::-webkit-outer-spin-button,.tm-stepper input::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
.tm-input,.tm-textarea,.tm-select{width:100%; padding:10px 13px; border:1px solid var(--border); border-radius:11px; background:var(--surface); color:var(--text); font-size:14.5px; transition:.15s;}
.tm-input:focus,.tm-textarea:focus,.tm-select:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(224,121,95,.15);}
.tm-textarea{resize:vertical; min-height:44px;}
.tm-backdrop{position:fixed; inset:0; background:rgba(20,16,12,.42); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; padding:18px; z-index:200; animation:fade .2s;}
.tm-modal{background:var(--surface); border-radius:20px; width:100%; max-width:460px; max-height:90vh; overflow:auto; box-shadow:0 24px 60px rgba(0,0,0,.3); animation:modalin .28s cubic-bezier(.3,1.2,.5,1);}
.tm-modal.wide{max-width:560px;}
@keyframes modalin{from{opacity:0; transform:translateY(14px) scale(.97);}to{opacity:1; transform:none;}}
.tm-modal-head{display:flex; justify-content:space-between; align-items:center; padding:18px 20px 12px;}
.tm-modal-head h3{margin:0; font-size:18px; font-weight:750;}
.tm-modal-body{padding:4px 20px 20px; display:flex; flex-direction:column; gap:14px;}
.tm-field{display:flex; flex-direction:column; gap:6px;}
.tm-field>span{font-size:13px; font-weight:650; color:var(--text-soft);}
.tm-field-row{display:flex; gap:12px;}
.tm-field-row .tm-field{flex:1;}
.tm-date-row{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.tm-date-row .tm-input{flex:1; min-width:140px;}
.tm-quad-pick{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.tm-quad-opt{display:flex; align-items:center; gap:6px; padding:10px 11px; border-radius:10px; border:2px solid transparent; cursor:pointer; font-size:12.5px; font-weight:700; text-align:left; transition:.15s; box-shadow:0 2px 6px var(--shadow);}
.tm-quad-opt.on{border-color:var(--accent);}
.tm-modal-foot{display:flex; align-items:center; gap:9px; padding-top:8px; flex-wrap:wrap;}
.tm-day-sub{display:flex; align-items:center; gap:7px; font-size:14px; font-weight:700; margin:6px 0 10px; color:var(--text-soft);}
.tm-loading{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; min-height:100vh; color:var(--text-soft);}
.tm-spinner{width:42px; height:42px; border-radius:50%; border:4px solid var(--surface-2); border-top-color:var(--accent); animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:760px){
  .tm-shell{flex-direction:column;}
  .tm-main{padding:18px 16px 96px;}
  .tm-nav{position:fixed; bottom:0; left:0; right:0; top:auto; height:auto; width:auto; flex-direction:row; border-right:none; border-top:1px solid var(--border); padding:7px 6px calc(7px + env(safe-area-inset-bottom,0));}
  .tm-brand,.tm-nav-btn span{display:none;}
  .tm-nav-items{flex-direction:row; justify-content:space-around; width:100%;}
  .tm-nav-btn{flex-direction:column; gap:3px; padding:8px; flex:1;}
  .tm-nav-btn.theme{margin-top:0; position:absolute; right:8px; top:-52px; width:42px; height:42px; border-radius:50%; background:var(--surface); border:1px solid var(--border); padding:0; justify-content:center; box-shadow:0 4px 12px var(--shadow);}
  .tm-bigdate{font-size:34px;}
  .tm-matrix{grid-template-columns:1fr; gap:13px;}
  .tm-month-cell{min-height:62px;}
  .tm-month-chip{font-size:9px;}
  .tm-field-row{flex-direction:column;}
}
.tm-topbar{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--border);}
.tm-cloud{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; padding:4px 11px; border-radius:99px; background:var(--surface-2); color:var(--text-soft);}
.tm-cloud.online{background:rgba(46,125,50,.14); color:#2E7D32;}
.tm-cloud.connecting{background:rgba(183,121,31,.16); color:#B7791F;}
.tm-cloud.error{background:rgba(192,57,43,.13); color:#C0392B;}
.tm-spin{animation:spin .8s linear infinite;}
.tm-sync-steps{margin:6px 0 12px; padding-left:20px; font-size:13.5px; line-height:1.6;}
.tm-sql{background:#1B1A18; color:#E8E2D8; border-radius:12px; padding:14px 16px; font-size:12px; line-height:1.5; overflow:auto; white-space:pre; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
.tm-nodate{font-size:12.5px; color:var(--text-soft); align-self:center; font-weight:600;}
.tm-pomo-fill{position:absolute; left:0; right:0; bottom:0; transition:height 1s linear; z-index:0; pointer-events:none; border-radius:0 0 22px 22px; border-top:2px solid var(--pc);}
.tm-pomo > *:not(.tm-pomo-fill){position:relative; z-index:1;}
.tm-pomo-core{display:flex; flex-direction:column; align-items:center; gap:8px; padding:30px 0 16px;}
.tm-pomo-time{font-size:84px; font-weight:800; letter-spacing:-3px; font-variant-numeric:tabular-nums; line-height:1;}
.tm-pomo-mode-label{font-size:15px; font-weight:700; display:inline-flex; align-items:center; gap:7px;}
.tm-pomo.ending .tm-pomo-time{animation:tmpulse .9s ease-in-out infinite;}
@keyframes tmpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
.tm-pomo.flash{animation:flashbig 1.2s ease !important;}
@keyframes flashbig{0%,100%{box-shadow:0 6px 14px var(--shadow);}22%{box-shadow:0 0 0 8px var(--pc),0 0 55px var(--pc);}}
.tm-overdue .tm-section-title{color:#C0392B;}
.tm-reschedule{font-size:11px; font-weight:700; padding:3px 9px; border-radius:99px; border:1px solid var(--accent); background:rgba(255,255,255,.55); color:var(--accent-d); cursor:pointer;}
.tm-reschedule:hover{background:#fff;}
.tm-pomo-btn{display:inline-flex; align-items:center; justify-content:center; width:26px; height:24px; border-radius:7px; border:1px solid var(--accent); background:rgba(255,255,255,.55); color:var(--accent-d); cursor:pointer;}
.tm-pomo-btn:hover{background:#fff;}
.tm-remind-presets{display:flex; flex-wrap:wrap; gap:6px;}
.tm-remind-chips{display:flex; flex-wrap:wrap; gap:6px;}
.tm-chip{font-size:12.5px; font-weight:650; padding:5px 11px; border-radius:99px; border:1px solid var(--border); background:var(--surface-2); color:var(--text); cursor:pointer;}
.tm-chip.on{background:var(--accent); border-color:var(--accent); color:#fff;}
.tm-chip:disabled{opacity:.4; cursor:default;}
.tm-chip-x{margin-left:6px; border:none; background:transparent; color:inherit; cursor:pointer; font-weight:800; font-size:14px; line-height:1;}
.tm-hint{font-size:12px; color:var(--text-soft); margin:2px 0;}
.tm-link{background:none; border:none; color:var(--accent-d); font-weight:700; font-size:13px; cursor:pointer; padding:8px 0 0;}
.tm-segment2{display:inline-flex; background:var(--surface-2); border-radius:10px; padding:3px; gap:2px; margin-bottom:10px;}
.tm-segment2 button{border:none; background:transparent; color:var(--text-soft); padding:6px 13px; border-radius:8px; cursor:pointer; font-weight:650; font-size:13px;}
.tm-segment2 button.on{background:var(--surface); color:var(--text); box-shadow:0 1px 4px var(--shadow);}
.tm-custom{margin-top:8px; background:var(--surface-2); border-radius:12px; padding:12px;}
.tm-custom-row{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.tm-custom-row .tm-input{max-width:92px;}
.tm-custom-row .tm-select{max-width:170px;}
.tm-habits{display:flex; flex-direction:column; gap:12px;}
.tm-habit{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px 16px;}
.tm-habit.done{border-color:#2E7D32;}
.tm-habit-top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.tm-habit-title{background:none; border:none; color:var(--text); font-weight:750; font-size:16px; cursor:pointer; text-align:left; padding:0;}
.tm-habit-streak{display:inline-flex; align-items:center; gap:4px; font-weight:700; font-size:13px; color:#E0795F; white-space:nowrap;}
.tm-habit-row{margin:11px 0;}
.tm-counter{display:inline-flex; align-items:center; gap:12px;}
.tm-counter button{width:38px; height:38px; border-radius:10px; border:1px solid var(--border); background:var(--surface-2); color:var(--text); cursor:pointer; display:inline-flex; align-items:center; justify-content:center;}
.tm-counter button:hover{background:var(--accent); color:#fff; border-color:var(--accent);}
.tm-counter-val{font-weight:800; font-size:17px; min-width:58px; text-align:center; font-variant-numeric:tabular-nums;}
.tm-habit-check{display:inline-flex; align-items:center; gap:7px; padding:9px 16px; border-radius:11px; border:1px solid var(--accent); background:var(--surface); color:var(--accent-d); font-weight:700; cursor:pointer;}
.tm-habit-check.on{background:#2E7D32; border-color:#2E7D32; color:#fff;}
.tm-habit-strip{display:flex; gap:4px; flex-wrap:wrap;}
.tm-dot{width:14px; height:14px; border-radius:4px; background:var(--surface-2);}
.tm-dot.done{background:#2E7D32;}
.tm-dot.partial{background:#F8CD76;}
.tm-dot.miss{background:#E7C7C0;}
.tm-dot.na{background:var(--surface-2); opacity:.45;}
@media(max-width:760px){ .tm-topbar{margin-bottom:14px; padding-bottom:10px;} .tm-pomo-time{font-size:68px;} }
.tm-prayers{display:flex; flex-wrap:wrap; gap:8px;}
.tm-prayer{display:inline-flex; align-items:center; gap:6px; padding:9px 15px; border-radius:12px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-weight:700; cursor:pointer;}
.tm-prayer.on{background:#2E7D32; border-color:#2E7D32; color:#fff;}
.tm-blocks{display:flex; flex-direction:column; gap:12px;}
.tm-block{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px 16px;}
.tm-block-head{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.tm-block-title{background:none; border:none; color:var(--text); font-weight:750; font-size:16px; cursor:pointer; text-align:left; padding:0;}
.tm-block-actions{display:flex; align-items:center; gap:10px; flex-shrink:0;}
.tm-block-prog{font-size:12.5px; color:var(--text-soft); font-weight:700;}
.tm-subs{display:flex; flex-direction:column; gap:6px; margin-top:11px;}
.tm-sub{display:inline-flex; align-items:center; gap:9px; padding:8px 11px; border-radius:10px; border:1px solid var(--border); background:var(--surface-2); color:var(--text); font-weight:600; cursor:pointer; text-align:left;}
.tm-sub.on{opacity:.6;}
.tm-sub-box{width:20px; height:20px; border-radius:6px; border:2px solid var(--accent); display:inline-flex; align-items:center; justify-content:center; color:#fff; flex-shrink:0;}
.tm-sub.on .tm-sub-box{background:#2E7D32; border-color:#2E7D32;}
.tm-subs-edit{display:flex; flex-direction:column; gap:6px;}
.tm-sub-edit{display:flex; align-items:center; justify-content:space-between; gap:8px; background:var(--surface-2); border-radius:8px; padding:6px 6px 6px 11px; font-size:14px;}
.tm-actions{display:flex; flex-direction:column; gap:8px;}
.tm-action{display:flex; align-items:center; gap:11px; padding:13px 14px; border-radius:12px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-weight:650; font-size:15px; cursor:pointer; text-align:left;}
.tm-action:hover{background:var(--surface-2);}
.tm-sub-row{display:flex; align-items:center; gap:8px;}
.tm-sub-row .tm-sub{flex:1;}
.tm-pomo-steps{display:flex; flex-direction:column; gap:6px; width:100%; max-width:420px;}
.tm-stepper.sm{flex-shrink:0;}
.tm-stepper.sm button{width:30px; height:32px; font-size:17px;}
.tm-stepper.sm input{width:42px; font-size:13px;}

@media(max-width:380px){
  .tm-quad-pick{grid-template-columns:1fr;}
}
