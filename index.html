.tm-app *{box-sizing:border-box;}
.tm-app{
  --bg:#F6F3EE; --surface:#FFFFFF; --surface-2:#F0ECE5; --text:#2B2722; --text-soft:#7A7269;
  --border:#E7E1D8; --accent:#E0795F; --accent-d:#C75F45; --shadow:rgba(60,50,40,.12);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--text); background:var(--bg); min-height:100vh; width:100%; -webkit-font-smoothing:antialiased;
}
.tm-app[data-theme="dark"]{
  --bg:#1B1A18; --surface:#262320; --surface-2:#2F2B27; --text:#EDE8E1; --text-soft:#A59C90;
  --border:#3A352F; --accent:#E0795F; --accent-d:#F0916F; --shadow:rgba(0,0,0,.4);
}
.tm-app input,.tm-app textarea,.tm-app select,.tm-app button{font-family:inherit;}
.tm-shell{display:flex; min-height:100vh;}
.tm-main{flex:1; min-width:0; padding:26px 30px 110px; overflow-x:hidden;}
.tm-view{max-width:1080px; margin:0 auto; animation:fade .35s ease;}
@keyframes fade{from{opacity:0; transform:translateY(6px);}to{opacity:1; transform:none;}}
.tm-nav{position:sticky; top:0; align-self:flex-start; height:100vh; width:200px; flex-shrink:0;
  background:var(--surface); border-right:1px solid var(--border); padding:22px 14px;
  display:flex; flex-direction:column; gap:6px; z-index:30;}
.tm-brand{display:flex; align-items:center; gap:10px; padding:6px 10px 18px;}
.tm-brand-dot{width:22px; height:22px; border-radius:7px; background:linear-gradient(135deg,#F7A6C2,#E0795F); box-shadow:0 2px 8px var(--shadow);}
.tm-brand-name{font-weight:700; font-size:16px; letter-spacing:-.2px;}
.tm-nav-items{display:flex; flex-direction:column; gap:4px; flex:1;}
.tm-nav-btn{display:flex; align-items:center; gap:12px; padding:11px 12px; border:none; background:transparent;
  color:var(--text-soft); border-radius:12px; cursor:pointer; font-size:14.5px; font-weight:600; transition:.18s; text-align:left;}
.tm-nav-btn:hover{background:var(--surface-2); color:var(--text);}
.tm-nav-btn.on{background:var(--accent); color:#fff; box-shadow:0 4px 14px rgba(224,121,95,.35);}
.tm-nav-btn.theme{margin-top:auto;}
.tm-eyebrow{color:var(--accent-d); font-weight:700; text-transform:uppercase; letter-spacing:1.5px; font-size:12px;}
.tm-bigdate{font-size:42px; font-weight:800; letter-spacing:-1px; margin:2px 0; line-height:1;}
.tm-subdate{color:var(--text-soft); font-weight:600;}
.tm-today-head{display:flex; justify-content:space-between; align-items:flex-start; gap:20px; flex-wrap:wrap; margin-bottom:26px;}
.tm-today-actions{display:flex; gap:10px; flex-wrap:wrap;}
.tm-h1{font-size:30px; font-weight:800; letter-spacing:-.5px; margin:0;}
.tm-head-simple{margin-bottom:22px; display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap;}
.tm-muted{color:var(--text-soft); margin:4px 0 0; font-size:14px;}
.tm-btn{display:inline-flex; align-items:center; gap:7px; padding:9px 15px; border-radius:11px; border:1px solid var(--border);
  background:var(--surface); color:var(--text); font-weight:650; font-size:14px; cursor:pointer; transition:.16s;}
.tm-btn:hover{transform:translateY(-1px); box-shadow:0 4px 12px var(--shadow);}
.tm-btn.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
.tm-btn.primary:hover{background:var(--accent-d);}
.tm-btn.small{padding:6px 11px; font-size:13px;}
.tm-btn.ghost{background:transparent;}
.tm-btn.danger{background:transparent; border-color:transparent; color:#C0392B;}
.tm-btn.danger:hover{background:rgba(192,57,43,.1);}
.tm-btn.clear{margin-top:18px; color:var(--text-soft);}
.tm-icon-btn{display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:10px;
  border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; transition:.16s;}
.tm-icon-btn:hover{background:var(--surface-2);}
.tm-icon-btn.ghost{border-color:transparent; background:transparent; color:var(--text-soft);}
.tm-icon-btn.big{width:48px; height:48px;}
.tm-spacer{flex:1;}
.tm-section{margin-bottom:30px;}
.tm-section-title{display:flex; align-items:center; gap:9px; font-size:17px; font-weight:750; margin:0 0 14px;}
.tm-section-row{display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:14px;}
.tm-section-row .tm-section-title{margin:0;}
.tm-empty{color:var(--text-soft); background:var(--surface); border:1px dashed var(--border); border-radius:14px; padding:18px; font-size:14px;}
.tm-empty.small{padding:12px; font-size:13px;}
.tm-progress-wrap{display:flex; align-items:center; gap:10px;}
.tm-progress{width:160px; height:9px; background:var(--surface-2); border-radius:99px; overflow:hidden;}
.tm-progress-bar{height:100%; background:linear-gradient(90deg,#A6DD97,#2E7D32); border-radius:99px; transition:width .5s cubic-bezier(.4,0,.2,1);}
.tm-progress-label{font-size:13px; color:var(--text-soft); font-weight:650; white-space:nowrap;}
.tm-rdv-list{display:flex; flex-direction:column; gap:9px;}
.tm-rdv{display:flex; align-items:stretch; gap:13px; background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:12px 15px; cursor:pointer; transition:.16s;}
.tm-rdv:hover{transform:translateY(-1px); box-shadow:0 5px 16px var(--shadow);}
.tm-rdv-time{display:flex; flex-direction:column; min-width:58px;}
.tm-rdv-h{font-weight:800; font-size:16px;}
.tm-rdv-dur{font-size:11.5px; color:var(--text-soft);}
.tm-rdv-bar{width:4px; border-radius:4px; background:var(--accent);}
.tm-rdv-title{font-weight:650; align-self:center;}
.tm-today-tasks{display:flex; flex-direction:column; gap:11px;}
.tm-postit{position:relative; border-radius:5px 12px 12px 12px; padding:13px 14px 11px;
  box-shadow:0 6px 14px var(--shadow),0 1px 0 rgba(255,255,255,.4) inset; cursor:pointer;
  transition:transform .18s cubic-bezier(.3,1.3,.5,1),box-shadow .18s,opacity .25s; animation:pop .28s cubic-bezier(.3,1.4,.5,1);}
.tm-postit::after{content:""; position:absolute; right:0; bottom:0; width:0; height:0;
  border-style:solid; border-width:0 0 18px 18px; border-color:transparent transparent rgba(0,0,0,.08) transparent; border-radius:0 0 12px 0;}
@keyframes pop{from{opacity:0; transform:scale(.92) translateY(6px);}to{opacity:1;}}
.tm-postit:hover{box-shadow:0 10px 22px var(--shadow);}
.tm-postit.grab{cursor:grab; touch-action:none;}
.tm-postit.grab:active{cursor:grabbing;}
.tm-postit.done{opacity:.55;}
.tm-postit.done .tm-postit-title{text-decoration:line-through;}
.tm-postit.dragging{opacity:.32; box-shadow:none;}
.tm-tape{position:absolute; top:-7px; left:50%; transform:translateX(-50%) rotate(-2deg); width:46px; height:14px;
  background:rgba(255,255,255,.45); border-radius:2px; box-shadow:0 1px 2px rgba(0,0,0,.08);}
.tm-postit-top{display:flex; align-items:flex-start; gap:9px;}
.tm-postit-title{font-weight:700; font-size:15px; line-height:1.25; flex:1; word-break:break-word;}
.tm-postit-note{font-size:13px; opacity:.78; margin:6px 0 0 28px; line-height:1.35; word-break:break-word;}
.tm-postit-foot{display:flex; align-items:center; justify-content:space-between; margin:9px 0 0 28px; gap:8px;}
.tm-postit.compact{padding:8px 10px;}
.tm-postit.compact .tm-postit-title{font-size:13px;}
.tm-postit.compact .tm-postit-foot{margin-left:24px; margin-top:5px;}
.tm-grip{opacity:.4;}
.tm-date-chip{font-size:11px; font-weight:700; padding:2px 8px; border-radius:99px; background:rgba(255,255,255,.5); color:inherit;}
.tm-date-chip.today{background:var(--accent); color:#fff;}
.tm-date-chip.muted{opacity:.6; background:rgba(255,255,255,.35);}
.tm-check{flex-shrink:0; width:21px; height:21px; border-radius:7px; border:2px solid var(--accent,currentColor);
  background:rgba(255,255,255,.5); color:var(--accent); display:inline-flex; align-items:center; justify-content:center;
  cursor:pointer; transition:.15s; margin-top:1px;}
.tm-check:hover{background:rgba(255,255,255,.85);}
.tm-check.on{background:var(--accent); color:#fff; border-color:var(--accent); animation:checkpop .3s;}
.tm-check.round{border-radius:50%;}
@keyframes checkpop{0%{transform:scale(.6);}60%{transform:scale(1.18);}100%{transform:scale(1);}}
.tm-matrix{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
.tm-quad{background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:14px; display:flex; flex-direction:column;
  border-top:4px solid var(--accent); min-height:200px;}
.tm-quad-head{display:flex; align-items:flex-start; gap:10px; margin-bottom:12px;}
.tm-quad-dot{width:12px; height:12px; border-radius:50%; margin-top:4px; flex-shrink:0;}
.tm-quad-title{font-size:15px; font-weight:750; margin:0; line-height:1.2;}
.tm-quad-sub{font-size:12.5px; color:var(--text-soft);}
.tm-quad-add{margin-left:auto; width:30px; height:30px; border-radius:9px; border:1px solid var(--border); background:var(--surface-2);
  color:var(--text); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; transition:.15s;}
.tm-quad-add:hover{background:var(--accent); color:#fff; border-color:var(--accent);}
